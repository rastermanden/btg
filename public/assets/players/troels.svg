<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Troels as Dolph Lundgren">
  <rect width="200" height="220" fill="#ffe9d1"/>
  <!-- Broad shoulders / tracksuit -->
  <path d="M2 220 L2 194 Q40 162 78 162 L122 162 Q160 162 198 194 L198 220 Z" fill="#c61d6e" stroke="#0e1a33" stroke-width="3"/>
  <!-- CCCP stripe -->
  <path d="M2 200 L198 200" stroke="#d8a63a" stroke-width="4"/>
  <text x="100" y="216" text-anchor="middle" font-family="'Bowlby One', sans-serif" font-size="11" fill="#d8a63a" letter-spacing="2">CCCP</text>
  <!-- Shirt neckline -->
  <path d="M78 162 L100 176 L122 162 Z" fill="#fff" stroke="#0e1a33" stroke-width="2"/>
  <!-- Thick neck -->
  <rect x="80" y="140" width="40" height="28" fill="#f3c79e" stroke="#0e1a33" stroke-width="3"/>
  <!-- Square jaw face -->
  <path d="M58 96 Q58 60 100 60 Q142 60 142 96 L142 128 Q140 152 124 156 L76 156 Q60 152 58 128 Z" fill="#f3c79e" stroke="#0e1a33" stroke-width="3"/>
  <!-- Flat-top blond hair -->
  <path d="M56 76 L56 52 Q56 42 70 42 L130 42 Q144 42 144 52 L144 76 Q140 62 100 62 Q60 62 56 76 Z" fill="#f0d770" stroke="#0e1a33" stroke-width="3"/>
  <!-- Hair flat top stripes -->
  <g stroke="#0e1a33" stroke-width="1" opacity=".4">
    <line x1="64" y1="48" x2="64" y2="70"/>
    <line x1="76" y1="46" x2="76" y2="70"/>
    <line x1="88" y1="46" x2="88" y2="70"/>
    <line x1="100" y1="46" x2="100" y2="70"/>
    <line x1="112" y1="46" x2="112" y2="70"/>
    <line x1="124" y1="46" x2="124" y2="70"/>
    <line x1="136" y1="48" x2="136" y2="70"/>
  </g>
  <!-- Red sweat headband -->
  <rect x="54" y="76" width="92" height="12" fill="#c61d6e" stroke="#0e1a33" stroke-width="2.5"/>
  <!-- Hammer & sickle-ish star on headband -->
  <polygon points="100,78 101.5,82 105.5,82 102.2,84.5 103.5,88.5 100,86 96.5,88.5 97.8,84.5 94.5,82 98.5,82" fill="#d8a63a" stroke="#0e1a33" stroke-width="0.6"/>
  <!-- Cold blue eyes -->
  <ellipse cx="82" cy="108" rx="6" ry="5" fill="#fff" stroke="#0e1a33" stroke-width="2"/>
  <ellipse cx="118" cy="108" rx="6" ry="5" fill="#fff" stroke="#0e1a33" stroke-width="2"/>
  <circle cx="82" cy="109" r="2.6" fill="#1c5fb8"/>
  <circle cx="118" cy="109" r="2.6" fill="#1c5fb8"/>
  <circle cx="83" cy="107.5" r="0.8" fill="#fff"/>
  <circle cx="119" cy="107.5" r="0.8" fill="#fff"/>
  <!-- Stern brows -->
  <path d="M72 98 L92 102" stroke="#c9a94a" stroke-width="4" stroke-linecap="round"/>
  <path d="M108 102 L128 98" stroke="#c9a94a" stroke-width="4" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M100 114 L96 130 Q100 134 104 130" fill="none" stroke="#0e1a33" stroke-width="2" stroke-linecap="round"/>
  <!-- Stone-cold straight mouth -->
  <line x1="86" y1="144" x2="114" y2="144" stroke="#0e1a33" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cheek/jaw shading -->
  <path d="M62 124 Q66 146 80 152" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".4"/>
  <path d="M138 124 Q134 146 120 152" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".4"/>
</svg>
