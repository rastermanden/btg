<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Troels as Dolph Lundgren">
  <rect width="200" height="220" fill="#ffe9d1"/>
  <!-- Broad shoulders / black turtleneck -->
  <path d="M2 220 L2 194 Q40 162 78 160 L122 160 Q160 162 198 194 L198 220 Z" fill="#0e1a33" stroke="#0e1a33" stroke-width="3"/>
  <!-- Turtleneck collar -->
  <path d="M74 160 Q100 170 126 160 L128 176 Q100 186 72 176 Z" fill="#1a2a4a" stroke="#0e1a33" stroke-width="2.5"/>
  <path d="M74 166 Q100 174 126 166" fill="none" stroke="#0e1a33" stroke-width="1.5" opacity=".6"/>
  <!-- Thick neck -->
  <rect x="82" y="138" width="36" height="26" fill="#f3c79e" stroke="#0e1a33" stroke-width="3"/>
  <!-- Square-jaw face -->
  <path d="M58 94 Q58 58 100 58 Q142 58 142 94 L142 126 Q140 150 124 154 L76 154 Q60 150 58 126 Z" fill="#f3c79e" stroke="#0e1a33" stroke-width="3"/>
  <!-- Slicked-back blond hair -->
  <path d="M56 86 L56 60 Q58 46 78 42 Q98 40 118 42 Q140 44 144 60 L144 88 Q140 74 128 70 Q138 56 118 54 Q100 52 82 56 Q66 60 72 72 Q60 76 56 86 Z" fill="#f0d770" stroke="#0e1a33" stroke-width="3"/>
  <!-- Hair combing lines (slicked back) -->
  <g stroke="#c9a94a" stroke-width="1.5" fill="none" opacity=".7">
    <path d="M66 58 Q78 52 98 50"/>
    <path d="M70 66 Q86 58 108 56"/>
    <path d="M76 74 Q96 66 122 64"/>
    <path d="M84 82 Q104 74 132 74"/>
  </g>
  <!-- Temple hairline -->
  <path d="M56 86 Q62 94 64 102" fill="none" stroke="#0e1a33" stroke-width="2.5"/>
  <path d="M144 86 Q138 94 136 102" fill="none" stroke="#0e1a33" stroke-width="2.5"/>
  <!-- Cold blue eyes -->
  <ellipse cx="82" cy="110" rx="7" ry="5.5" fill="#fff" stroke="#0e1a33" stroke-width="2"/>
  <ellipse cx="118" cy="110" rx="7" ry="5.5" fill="#fff" stroke="#0e1a33" stroke-width="2"/>
  <circle cx="82" cy="111" r="3" fill="#3a88c9"/>
  <circle cx="118" cy="111" r="3" fill="#3a88c9"/>
  <circle cx="82" cy="111" r="1.3" fill="#0e1a33"/>
  <circle cx="118" cy="111" r="1.3" fill="#0e1a33"/>
  <circle cx="83.4" cy="109.5" r="0.9" fill="#fff"/>
  <circle cx="119.4" cy="109.5" r="0.9" fill="#fff"/>
  <!-- Stern brows -->
  <path d="M72 100 L94 104" stroke="#c9a94a" stroke-width="4" stroke-linecap="round"/>
  <path d="M106 104 L128 100" stroke="#c9a94a" stroke-width="4" stroke-linecap="round"/>
  <!-- Straight nose, strong bridge -->
  <path d="M100 114 L95 132 Q100 136 105 132" fill="none" stroke="#0e1a33" stroke-width="2" stroke-linecap="round"/>
  <!-- Stone-cold flat mouth -->
  <line x1="86" y1="144" x2="114" y2="144" stroke="#0e1a33" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Subtle jaw shading -->
  <path d="M62 122 Q66 146 80 152" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".35"/>
  <path d="M138 122 Q134 146 120 152" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".35"/>
  <!-- Cheekbone hint -->
  <path d="M70 118 Q76 124 78 130" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".3"/>
  <path d="M130 118 Q124 124 122 130" fill="none" stroke="#0e1a33" stroke-width="1" opacity=".3"/>
</svg>
